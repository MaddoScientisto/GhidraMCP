name: Build with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      FullRelease:
        description: "Publish the current latest version as a full release"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GHIDRA_VERSION: 11.3.2
      GHIDRA_DATE: 20250415
      GHIDRA_LIBS: >-
        Features/Base/lib/Base.jar
        Features/Decompiler/lib/Decompiler.jar
        Framework/Docking/lib/Docking.jar
        Framework/Generic/lib/Generic.jar
        Framework/Project/lib/Project.jar
        Framework/SoftwareModeling/lib/SoftwareModeling.jar
        Framework/Utility/lib/Utility.jar
        Framework/Gui/lib/Gui.jar

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Resolve release version
      id: version
      run: |
        git fetch --tags --force
        latest_tag=$(git tag --sort=-v:refname | head -n 1)
        latest_tag=${latest_tag#v}

        if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.FullRelease }}" = "true" ]; then
          version="$latest_tag"
          is_prerelease="false"
        else
          IFS='.' read -r -a parts <<< "$latest_tag"
          if [ ${#parts[@]} -lt 3 ]; then
            parts+=(1)
          else
            last_index=$((${#parts[@]} - 1))
            parts[$last_index]=$((parts[$last_index] + 1))
          fi
          version=$(IFS='.'; echo "${parts[*]}")
          is_prerelease="true"
        fi

        echo "version=${version}" >> "$GITHUB_OUTPUT"
        echo "is_prerelease=${is_prerelease}" >> "$GITHUB_OUTPUT"

    - name: Create release tag
      if: github.event_name != 'pull_request' && steps.version.outputs.is_prerelease == 'true'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag "${{ steps.version.outputs.version }}"
        git push origin "refs/tags/${{ steps.version.outputs.version }}"

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Download Ghidra
      run: |
        wget --no-verbose -O ghidra.zip https://github.com/NationalSecurityAgency/ghidra/releases/download/Ghidra_${{ env.GHIDRA_VERSION }}_build/ghidra_${{ env.GHIDRA_VERSION }}_PUBLIC_${{ env.GHIDRA_DATE }}.zip
        7z x -bd ghidra.zip

    - name: Copy Ghidra libs
      run: |
        mkdir -p ./lib
        for libfile in ${{ env.GHIDRA_LIBS }}
          do echo "Copying ${libfile} to lib/"
          cp ghidra_${{ env.GHIDRA_VERSION }}_PUBLIC/Ghidra/${libfile} ./lib/
        done

    - name: Build with Maven
      run: mvn clean package assembly:single

    - name: Assemble release bundle
      run: |
        mkdir -p release
        release_prefix=""
        if [ "${{ steps.version.outputs.is_prerelease }}" = "true" ]; then
          release_prefix="pre"
        else
          release_prefix=""
        fi
        bundle_name="GhidraMCP-${release_prefix}release-${{ steps.version.outputs.version }}.zip"
        zip -j "release/${bundle_name}" target/GhidraMCP-*-SNAPSHOT.zip bridge_mcp_ghidra.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: GhidraMCP-${{ steps.version.outputs.is_prerelease == 'true' && 'prerelease' || 'release' }}-${{ steps.version.outputs.version }}
        path: release/GhidraMCP-${{ steps.version.outputs.is_prerelease == 'true' && 'prerelease' || 'release' }}-${{ steps.version.outputs.version }}.zip

    - name: Publish GitHub release
      if: github.event_name != 'pull_request'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.version }}
        name: GhidraMCP ${{ steps.version.outputs.version }}
        files: |
          release/GhidraMCP-${{ steps.version.outputs.is_prerelease == 'true' && 'prerelease' || 'release' }}-${{ steps.version.outputs.version }}.zip
        prerelease: ${{ steps.version.outputs.is_prerelease }}
        generate_release_notes: true
        overwrite_files: true
